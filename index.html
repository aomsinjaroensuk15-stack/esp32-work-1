<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Relay Controller</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #f97316;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 340px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        h1 { font-size: 1.8rem; margin: 0 0 0.5rem 0; }
        p.subtitle { font-size: 0.9rem; color: #94a3b8; margin-bottom: 1.5rem; }
        
        .ip-config {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .ip-config label {
            font-size: 0.8rem;
            color: #94a3b8;
            display: block;
            margin-bottom: 0.4rem;
        }
        .ip-config input {
            width: 100%;
            padding: 0.6rem;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            font-family: monospace;
            box-sizing: border-box;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2.5rem;
            font-size: 0.9rem;
            color: #94a3b8;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #64748b;
            transition: all 0.3s ease;
        }
        .dot.on {
            background-color: #22c55e;
            box-shadow: 0 0 12px #22c55e;
        }
        .control-btn {
            width: 100%;
            padding: 1.2rem;
            font-size: 1.2rem;
            font-weight: 700;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: #334155;
            color: #cbd5e1;
        }
        .control-btn.active {
            background: var(--accent-color);
            color: white;
            box-shadow: 0 0 25px rgba(249, 115, 22, 0.45);
        }
        .control-btn:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Relay Control</h1>
        <p class="subtitle">IoT Home Automation</p>
        
        <div class="ip-config">
            <label for="ipAddress">ESP32 IP Address:</label>
            <input type="text" id="ipAddress" value="">
        </div>

        <div class="status-indicator">
            <div id="statusDot" class="dot"></div>
            <span id="statusText">กำลังตรวจสอบ...</span>
        </div>
        <button id="toggleBtn" class="control-btn">TURN ON</button>
    </div>

    <script>
        // ⚙️ [คุณสามารถตั้งค่าเปลี่ยนเลข IP ตัวหลักของคุณตรงนี้ได้เลยครับ]
        const DEFAULT_ESP32_IP = "192.168.1.58";

        const ipInput = document.getElementById('ipAddress');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const toggleBtn = document.getElementById('toggleBtn');
        let isRelayOn = false;

        // ดึงค่าเริ่มต้นมาใส่ในช่องกรอกข้อมูล
        ipInput.value = DEFAULT_ESP32_IP;

        function getBaseUrl() {
            let ip = ipInput.value.trim();
            if (!ip.startsWith('http://') && !ip.startsWith('https://')) {
                ip = 'http://' + ip;
            }
            return ip;
        }

        async function sendCommand(endpoint) {
            try {
                const response = await fetch(`${getBaseUrl()}/${endpoint}`);
                if (response.ok) {
                    const state = await response.text();
                    updateUI(state === 'ON');
                }
            } catch (error) {
                console.error("Error sending command:", error);
                statusText.textContent = "เชื่อมต่อล้มเหลว";
                statusDot.className = "dot";
            }
        }

        async function checkStatus() {
            if (!ipInput.value.trim()) return;
            try {
                const response = await fetch(`${getBaseUrl()}/status`);
                if (response.ok) {
                    const state = await response.text();
                    updateUI(state === 'ON');
                }
            } catch (e) {
                statusText.textContent = "ออฟไลน์";
                statusDot.className = "dot";
            }
        }

        function updateUI(isOn) {
            isRelayOn = isOn;
            if (isRelayOn) {
                statusDot.className = "dot on";
                statusText.textContent = "ออนไลน์ • รีเลย์เปิดไฟอยู่";
                toggleBtn.textContent = "TURN OFF";
                toggleBtn.classList.add('active');
            } else {
                statusDot.className = "dot";
                statusText.textContent = "ออนไลน์ • รีเลย์ปิดไฟอยู่";
                toggleBtn.textContent = "TURN ON";
                toggleBtn.classList.remove('active');
            }
        }

        toggleBtn.addEventListener('click', () => {
            sendCommand(isRelayOn ? 'relay/off' : 'relay/on');
        });

        // ตรวจสอบสถานะการเชื่อมต่ออัตโนมัติทุกๆ 3 วินาที
        checkStatus();
        setInterval(checkStatus, 3000);
    </script>
</body>
</html>
